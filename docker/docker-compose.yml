services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appgym
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appgym_dev}
      POSTGRES_DB: postgres
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_dev}
      BUSINESS_DB_PASSWORD: ${BUSINESS_DB_PASSWORD:-business_dev}
      BOOKING_DB_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_dev}
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appgym -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [appgym-network]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [appgym-network]

networks:
  appgym-network:
    driver: bridge

volumes:
  postgres_data:
