services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appgym
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appgym_dev}
      POSTGRES_DB: postgres
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_dev}
      BUSINESS_DB_PASSWORD: ${BUSINESS_DB_PASSWORD:-business_dev}
      BOOKING_DB_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_dev}
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appgym -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [appgym-network]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [appgym-network]

  auth-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-please-change-in-production-1234567890}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [appgym-network]

  business-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: business-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: business_db
      DB_USER: business_user
      DB_PASSWORD: ${BUSINESS_DB_PASSWORD:-business_dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [appgym-network]

  booking-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: booking-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: booking_user
      DB_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [appgym-network]

  api-gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-please-change-in-production-1234567890}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - business-service
      - booking-service
    networks: [appgym-network]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks: [appgym-network]

networks:
  appgym-network:
    driver: bridge

volumes:
  postgres_data:
