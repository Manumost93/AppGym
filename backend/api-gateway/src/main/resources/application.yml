server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: business-service
          uri: http://business-service:8082
          predicates:
            - Path=/api/business/**
        - id: booking-service
          uri: http://booking-service:8083
          predicates:
            - Path=/api/booking/**
        - id: ai-service
          uri: http://ai-service:8084
          predicates:
            - Path=/api/ai/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${FRONTEND_ORIGIN:http://localhost:4200}
            allowedMethods: "*"
            allowedHeaders: "*"
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:}

security:
  public-paths:
    - /api/auth/register
    - /api/auth/login
    - /api/auth/refresh
    - /actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
