server:
  port: 8084

spring:
  application:
    name: ai-service

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model:
    chat: ${CLAUDE_MODEL_CHAT:claude-haiku-4-5}
    recommend: ${CLAUDE_MODEL_RECOMMEND:claude-sonnet-5}
    insights: ${CLAUDE_MODEL_INSIGHTS:claude-sonnet-5}

internal-services:
  business-service-url: ${BUSINESS_SERVICE_URL:http://business-service:8082}
  booking-service-url: ${BOOKING_SERVICE_URL:http://booking-service:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
