name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: ./mvnw -B -q verify

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # Solo en push a main: construye y publica las 5 imagenes del backend en
  # GHCR, listas para que el VPS haga "docker compose pull" en vez de tener
  # que compilar Java en la propia maquina de produccion.
  publish-images:
    name: Publish images (GHCR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-gateway, auth-service, business-service, booking-service, ai-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Los registries de contenedores exigen nombres en minusculas; el owner
      # del repo (Manumost93) no lo esta, asi que lo normalizamos aqui.
      - name: Compute lowercase image namespace
        run: echo "IMAGE_NAMESPACE=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: backend
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/appgym-${{ matrix.service }}:latest
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/appgym-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
